{% extends "admin/index.html" %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        /* Mudando as cores principais do admin */
        --primary: #1e293b; /* Cor do cabeçalho */
        --secondary: #10b981; /* Cor dos botões de ação */
        --link-fg: #3b82f6; 
    }

    /* Grid do seu Dashboard */
    .meu-dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .dashboard-card {
        background: #ffffff;
        padding: 20px;
        border-radius: 8px;
        border-left: 4px solid var(--secondary);
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    
    .dashboard-card h3 { margin: 0; color: #64748b; font-size: 14px; text-transform: uppercase; }
    .dashboard-card p { margin: 10px 0 0 0; font-size: 28px; font-weight: bold; color: var(--primary); }
</style>
{% endblock %}

{% block content %}
<div class="meu-dashboard">
    <div class="dashboard-card">
        <h3>Acessos Totais Registrados</h3>
        <p>1.204</p> </div>
    <div class="dashboard-card">
        <h3>QR Codes Validados Hoje</h3>
        <p>342</p>
    </div>
</div>

{{ block.super }}
{% endblock %}
